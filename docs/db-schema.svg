<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5px; rx: 8px; }
    .title { font: bold 14px/1.2 'Segoe UI', Roboto, Arial; fill: #0f1724; }
    .field { font: 12px/1.2 'Segoe UI', Roboto, Arial; fill: #475569; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- PROFILES -->
  <rect x="40" y="30" width="260" height="160" class="box" />
  <text x="60" y="56" class="title">PROFILES</text>
  <text x="60" y="80" class="field">id UUID PK (auth.users)</text>
  <text x="60" y="100" class="field">email</text>
  <text x="60" y="120" class="field">full_name</text>
  <text x="60" y="140" class="field">role (admin|seller|buyer)</text>
  <text x="60" y="160" class="field">company_name, phone</text>

  <!-- PRODUCTS -->
  <rect x="360" y="30" width="300" height="180" class="box" />
  <text x="380" y="56" class="title">PRODUCTS</text>
  <text x="380" y="80" class="field">id UUID PK</text>
  <text x="380" y="100" class="field">name, description, sku, category</text>
  <text x="380" y="120" class="field">base_unit (g|mL|unit)</text>
  <text x="380" y="140" class="field">base_price_paise (BIGINT)</text>
  <text x="380" y="160" class="field">stock_quantity (NUMERIC)</text>
  <text x="380" y="180" class="field">created_by UUID → PROFILES.id</text>

  <!-- QUOTATIONS -->
  <rect x="40" y="220" width="320" height="140" class="box" />
  <text x="60" y="246" class="title">QUOTATIONS</text>
  <text x="60" y="270" class="field">id UUID PK</text>
  <text x="60" y="290" class="field">user_id UUID → PROFILES.id</text>
  <text x="60" y="310" class="field">status (pending|approved|rejected|fulfilled)</text>
  <text x="60" y="330" class="field">total_paise (BIGINT)</text>

  <!-- QUOTATION_ITEMS -->
  <rect x="420" y="240" width="420" height="140" class="box" />
  <text x="440" y="266" class="title">QUOTATION_ITEMS</text>
  <text x="440" y="290" class="field">id UUID PK</text>
  <text x="440" y="310" class="field">quotation_id UUID → QUOTATIONS.id</text>
  <text x="440" y="330" class="field">product_id UUID → PRODUCTS.id</text>
  <text x="440" y="350" class="field">ordered_qty_base (NUMERIC)</text>
  <text x="440" y="370" class="field">unit_price_paise, line_total_paise</text>

  <!-- Relationships arrows -->
  <path d="M 300 110 L 360 110" class="arrow" />
  <text x="320" y="102" class="field">creates/owns</text>

  <path d="M 200 190 L 200 220 L 200 220" class="arrow" />

  <path d="M 340 240 L 420 240" class="arrow" />
  <text x="380" y="236" class="field">contains</text>

  <path d="M 560 200 L 560 240" class="arrow" />
  <text x="540" y="204" class="field">referenced by</text>

  <!-- Legend -->
  <rect x="40" y="380" width="920" height="120" rx="8" fill="#fbfdff" stroke="#e6eaf0" />
  <text x="60" y="406" class="title">Legend & Notes</text>
  <text x="60" y="428" class="field">• Prices stored in paise (BIGINT) to avoid float errors.</text>
  <text x="60" y="448" class="field">• Quantities in base units (NUMERIC) for precision and large values.</text>
  <text x="60" y="468" class="field">• Seller visibility derived via products.created_by and quotation_items.product_id.</text>
</svg>
